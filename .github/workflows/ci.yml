name: CI

on:
  pull_request:
  push:
    branches: [main, 'feature/**']

permissions:
  contents: read

env:
  STORE_SUBMISSIONS_ENABLED: 'false'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Assert test-period release policy
        run: test "$STORE_SUBMISSIONS_ENABLED" = 'false'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify code
        run: ./gradlew :core:model:test :app:testOssDebugUnitTest :app:lintOssDebug :app:assembleOssDebug --no-daemon --console=plain

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: androml-oss-debug-apk
          path: app/build/outputs/apk/oss/debug/app-oss-debug.apk
          if-no-files-found: error

