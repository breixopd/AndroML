name: CI

on:
  pull_request:
  push:
    branches: [main, 'feature/**']

permissions:
  contents: read

env:
  STORE_SUBMISSIONS_ENABLED: 'false'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Assert test-period release policy
        run: test "$STORE_SUBMISSIONS_ENABLED" = 'false'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4.4.1

      - name: Verify code
        run: ./gradlew :core:model:test :core:files:test :core:network:test :runtime:api:test :optimizer:test :app:testOssDebugUnitTest :app:lintOssDebug :app:assembleOssDebug --no-daemon --console=plain

      - name: Upload debug APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: androml-oss-debug-apk
          path: app/build/outputs/apk/oss/debug/app-oss-debug.apk
          if-no-files-found: error
